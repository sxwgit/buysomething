<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header text-center"><h5>管理员登录</h5></div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" placeholder="请输入管理员密码">
                        </div>
                        <div id="error" class="text-danger mb-2" style="display:none"></div>
                        <button class="btn btn-primary w-100" id="btn-login">登录</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('btn-login').addEventListener('click', async function() {
            const pwd = document.getElementById('password').value;
            const err = document.getElementById('error');
            const res = await fetch('/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: pwd}),
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                err.textContent = '密码错误';
                err.style.display = '';
            }
        });
    </script>
</body>
</html>
