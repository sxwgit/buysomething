{% extends "base.html" %}
{% block title %}附件管理 - 采购管理系统{% endblock %}

{% block content %}
<section class="page-hero">
    <div>
        <div class="page-eyebrow">Attachment Coverage</div>
        <h1 class="page-title">附件管理</h1>
    </div>
</section>

<div class="card panel-card toolbar-card mb-3">
    <div class="card-body py-2">
        <div class="row g-2 align-items-end">
            <div class="col-auto">
                <select class="form-select form-select-sm" id="filter-year">
                    <option value="">选择年份</option>
                </select>
            </div>
            <div class="col-auto">
                <select class="form-select form-select-sm" id="filter-month">
                    <option value="">选择月份</option>
                    {% for m in range(1, 13) %}<option value="{{ m }}">{{ m }}月</option>{% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <button class="btn btn-primary btn-sm" id="btn-search">查询</button>
            </div>
            <div class="col-auto ms-auto admin-only" style="display:none">
                <button class="btn btn-success btn-sm" id="btn-upload" disabled>上传附件</button>
            </div>
        </div>
    </div>
</div>

<div class="card panel-card mb-3">
    <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <span>月度附件完整性</span>
        <span class="small text-muted" id="coverage-summary">请选择年份和月份</span>
    </div>
    <div class="card-body py-2">
        <div class="row g-2" id="coverage-grid">
            <div class="text-muted">请选择年份和月份后查看</div>
        </div>
    </div>
</div>

<div class="section-head">
    <div>
        <h2>归档附件</h2>
        <p>按年月和部门自动分组，适合快速定位审批邮件、报价单和采购材料。</p>
    </div>
    <div class="section-head-meta">
        <span class="meta-pill" id="attachment-group-meta">等待加载</span>
    </div>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">上传附件</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">年份 <span class="text-danger">*</span></label>
                        <select class="form-select" id="upload-year"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">月份 <span class="text-danger">*</span></label>
                        <select class="form-select" id="upload-month">
                            {% for m in range(1, 13) %}<option value="{{ m }}">{{ m }}月</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">部门 <span class="text-danger">*</span></label>
                        <select class="form-select" id="upload-dept"></select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">选择文件</label>
                        <input type="file" class="form-control" id="upload-file" multiple>
                    </div>
                    <div class="col-12">
                        <label class="form-label">说明（如邮件主题）</label>
                        <input type="text" class="form-control" id="upload-description" placeholder="可选，如审批邮件主题">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btn-do-upload">上传</button>
            </div>
        </div>
    </div>
</div>

<!-- Attachment list -->
<div id="attachment-list"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/attachment.js"></script>
{% endblock %}
