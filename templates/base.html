<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}采购管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">采购管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link {% if active_page == 'index' %}active{% endif %}" href="/">采购列表</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_page == 'attachments' %}active{% endif %}" href="/attachments">附件管理</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_page == 'reports' %}active{% endif %}" href="/reports">透视报表</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_page == 'settings' %}active{% endif %}" href="/settings" id="nav-settings" style="display:none">系统设置</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span id="admin-status" class="text-light me-2" style="display:none">管理员模式</span>
                    <button id="btn-admin-toggle" class="btn btn-outline-light btn-sm">管理员登录</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <!-- Admin Login Modal -->
    <div class="modal fade" id="adminLoginModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">管理员登录</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="admin-password" placeholder="请输入管理员密码">
                    </div>
                    <div id="login-error" class="text-danger" style="display:none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="btn-login">登录</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script>
        // Admin auth helpers
        async function checkAdmin() {
            try {
                const res = await fetch('/admin/check');
                const data = await res.json();
                return data.is_admin;
            } catch { return false; }
        }

        function updateAdminUI(isAdmin) {
            const btn = document.getElementById('btn-admin-toggle');
            const status = document.getElementById('admin-status');
            const settings = document.getElementById('nav-settings');
            document.querySelectorAll('.admin-only').forEach(el => {
                el.style.display = isAdmin ? '' : 'none';
            });
            if (isAdmin) {
                btn.textContent = '退出管理';
                btn.classList.replace('btn-outline-light', 'btn-warning');
                status.style.display = '';
                settings.style.display = '';
            } else {
                btn.textContent = '管理员登录';
                btn.classList.replace('btn-warning', 'btn-outline-light');
                status.style.display = 'none';
                settings.style.display = 'none';
            }
        }

        document.getElementById('btn-admin-toggle').addEventListener('click', async function() {
            const isAdmin = await checkAdmin();
            if (isAdmin) {
                await fetch('/admin/logout', {method: 'POST'});
                updateAdminUI(false);
            } else {
                new bootstrap.Modal(document.getElementById('adminLoginModal')).show();
            }
        });

        document.getElementById('btn-login').addEventListener('click', async function() {
            const pwd = document.getElementById('admin-password').value;
            const errEl = document.getElementById('login-error');
            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: pwd}),
                });
                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('adminLoginModal')).hide();
                    updateAdminUI(true);
                    errEl.style.display = 'none';
                    if (typeof onAdminChange === 'function') onAdminChange(true);
                } else {
                    errEl.textContent = '密码错误';
                    errEl.style.display = '';
                }
            } catch {
                errEl.textContent = '请求失败';
                errEl.style.display = '';
            }
        });

        // Check on load
        checkAdmin().then(isAdmin => updateAdminUI(isAdmin));
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
