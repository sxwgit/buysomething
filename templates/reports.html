{% extends "base.html" %}
{% block title %}透视报表 - 采购管理系统{% endblock %}

{% block content %}
<div class="card mb-3">
    <div class="card-body py-2">
        <div class="row g-2 align-items-end">
            <div class="col-auto">
                <label class="form-label-sm mb-0">年份 <span class="text-danger">*</span></label>
                <select class="form-select form-select-sm" id="filter-year">
                    <option value="">选择年份</option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label-sm mb-0">月份</label>
                <select class="form-select form-select-sm" id="filter-month">
                    <option value="">全部月份</option>
                    {% for m in range(1, 13) %}<option value="{{ m }}">{{ m }}月</option>{% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <button class="btn btn-primary btn-sm" id="btn-query">查询</button>
            </div>
        </div>
    </div>
</div>

<ul class="nav nav-tabs" id="report-tabs">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-summary">部门采购汇总</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-ratio">部门占比</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-category">资产分类分布</a></li>
</ul>

<div class="tab-content mt-3">
    <!-- Department Summary -->
    <div class="tab-pane fade show active" id="tab-summary">
        <div class="d-flex justify-content-end mb-2">
            <button class="btn btn-outline-success btn-sm" id="btn-export-summary">导出 Excel</button>
        </div>
        <table class="table table-bordered table-sm">
            <thead><tr><th>部门</th><th>记录条数</th><th>采购总数</th><th>采购总金额</th></tr></thead>
            <tbody id="summary-body"></tbody>
            <tfoot><tr class="table-info"><td>合计</td><td id="summary-count"></td><td id="summary-qty"></td><td id="summary-amount"></td></tr></tfoot>
        </table>
    </div>

    <!-- Department Ratio -->
    <div class="tab-pane fade" id="tab-ratio">
        <div class="d-flex justify-content-end mb-2">
            <button class="btn btn-outline-success btn-sm" id="btn-export-ratio">导出 Excel</button>
        </div>
        <div id="ratio-chart" style="width:100%;height:450px;"></div>
    </div>

    <!-- Category Distribution -->
    <div class="tab-pane fade" id="tab-category">
        <div class="d-flex justify-content-end mb-2">
            <button class="btn btn-outline-success btn-sm" id="btn-export-category">导出 Excel</button>
        </div>
        <div id="category-chart" style="width:100%;height:450px;"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="/static/js/report.js"></script>
{% endblock %}
